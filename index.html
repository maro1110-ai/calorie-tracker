<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="칼로리 트래커">
<meta name="theme-color" content="#1A1A2E">
<title>칼로리 트래커</title>
<style>
  :root {
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --c-bg:     #F2F4F8;
    --c-card:   #FFFFFF;
    --c-header: #1A1A2E;
    --c-gold:   #FFD700;
    --c-red:    #D85A30;
    --c-blue:   #378ADD;
    --c-green:  #1D9E75;
    --c-purple: #7F77DD;
    --c-amber:  #EF9F27;
    --c-text:   #2D2D2D;
    --c-sub:    #888;
    --c-line:   #F0F0F0;
    --radius:   14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; overflow: hidden;
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--c-bg); color: var(--c-text);
  }

  /* ── 앱 래퍼 ── */
  #app {
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }

  /* ── 헤더 ── */
  .app-header {
    background: linear-gradient(135deg, #1A1A2E 0%, #16213E 55%, #0F3460 100%);
    padding: 16px 20px 14px;
    color: white; flex-shrink: 0;
  }
  .app-header h1 { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; }
  .app-header .sub { font-size: 11px; color: #AAB8D4; margin-top: 2px; }
  .goal-badge {
    display: inline-block;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px; padding: 4px 12px;
    font-size: 11px; font-weight: 700; color: var(--c-gold); margin-top: 8px;
  }

  /* ── 탭바 ── */
  .tab-bar {
    display: flex; background: white;
    border-bottom: 1px solid #E5E5E5;
    flex-shrink: 0; z-index: 10;
  }
  .tab-btn {
    flex: 1; padding: 12px 0; font-size: 12px; font-weight: 700;
    border: none; background: transparent; cursor: pointer; color: #AAA;
    border-bottom: 2.5px solid transparent; transition: all 0.18s;
  }
  .tab-btn.active { color: #0F3460; border-bottom-color: #0F3460; }

  /* ── 스크롤 컨텐츠 ── */
  .tab-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .tab-content > .inner { padding: 16px 14px 24px; }

  /* ── 카드 ── */
  .card {
    background: var(--c-card); border-radius: var(--radius);
    padding: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); margin-bottom: 12px;
  }
  .card-title { font-size: 13px; font-weight: 700; color: #555; margin-bottom: 12px; }

  /* ── 날짜 입력 ── */
  input[type="date"] {
    width: 100%; border: 1.5px solid #DDD; border-radius: 10px;
    padding: 10px 12px; font-size: 15px; font-family: inherit;
    outline: none; appearance: none; -webkit-appearance: none;
    background: white; color: var(--c-text);
  }

  /* ── 식사 카드 그리드 ── */
  .meal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .meal-card {
    background: white; border-radius: 12px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.06); overflow: hidden;
  }
  .meal-card-top { padding: 12px 11px 10px; }
  .meal-card-label {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
  }
  .meal-name { font-size: 12px; font-weight: 700; }
  .detail-btn {
    font-size: 10px; font-weight: 600; border-radius: 10px;
    padding: 2px 7px; border: 1px solid; background: transparent; cursor: pointer;
  }
  .meal-input {
    width: 100%; border: 1.5px solid #EEE; border-radius: 8px;
    padding: 8px 6px; font-size: 17px; font-weight: 700;
    color: var(--c-red); text-align: center; outline: none;
    font-family: inherit; background: #FAFAFA;
  }
  .meal-unit { font-size: 10px; color: #CCC; text-align: center; margin-top: 3px; }

  /* 상세 펼치기 */
  .meal-detail {
    border-top: 1px solid #F0F0F0; padding: 10px 11px;
    font-size: 11px;
  }
  .macro-mini-bar {
    display: flex; border-radius: 4px; height: 5px; overflow: hidden; margin-bottom: 6px;
  }
  .macro-nums { display: flex; gap: 8px; color: #666; margin-bottom: 7px; }
  .macro-nums span b { font-weight: 700; }
  .detail-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 3px 0; border-bottom: 1px solid #F8F8F8;
  }
  .detail-item:last-child { border-bottom: none; }
  .detail-item-name { color: #555; }
  .detail-item-kcal { font-weight: 700; color: var(--c-red); flex-shrink: 0; }

  /* ── 합계 박스 ── */
  .total-box {
    background: linear-gradient(135deg, #1A1A2E, #0F3460);
    border-radius: var(--radius); padding: 16px 18px; margin-bottom: 12px;
  }
  .total-box .t-lbl { font-size: 11px; color: #AAB8D4; margin-bottom: 3px; }
  .total-box .t-val { font-size: 28px; font-weight: 800; color: var(--c-gold); }
  .total-box .t-gap { font-size: 11px; color: #AAB8D4; margin-top: 2px; margin-bottom: 10px; }
  .prog-track { background: rgba(255,255,255,0.15); border-radius: 5px; height: 7px; overflow: hidden; }
  .prog-fill  { height: 100%; border-radius: 5px; transition: width 0.4s; }
  .prog-pct   { font-size: 10px; color: #AAB8D4; text-align: right; margin-top: 3px; }

  /* ── 영양소 카드 ── */
  .macro-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
  .macro-card { border-radius: 10px; padding: 11px 8px; text-align: center; }
  .mc-lbl { font-size: 10px; color: #888; margin-bottom: 3px; }
  .mc-val { font-size: 19px; font-weight: 800; line-height: 1; }
  .mc-unit{ font-size: 10px; color: #AAA; margin-top: 1px; }
  .mc-pct { font-size: 10px; font-weight: 600; margin-top: 4px; }

  /* ── 테이블 ── */
  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .data-table th {
    background: #F8F8F8; padding: 8px 6px; text-align: center;
    font-weight: 700; border-bottom: 1px solid #EEE;
  }
  .data-table th:first-child { text-align: left; }
  .data-table td { padding: 8px 6px; text-align: center; border-bottom: 1px solid #F5F5F5; }
  .data-table td:first-child { text-align: left; }
  .data-table tfoot td {
    font-weight: 800; background: #F8F8F8;
    border-top: 1px solid #EEE; border-bottom: none;
  }

  /* ── 저장 버튼 ── */
  .save-btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, #0F3460, #1A5276);
    color: white; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    letter-spacing: 0.3px; margin-bottom: 8px;
    -webkit-appearance: none;
  }
  .save-btn:active { opacity: 0.8; }

  /* ── 주간 네비 ── */
  .week-nav {
    display: flex; align-items: center; justify-content: space-between;
    background: white; border-radius: 12px; padding: 11px 14px;
    margin-bottom: 12px; box-shadow: 0 1px 5px rgba(0,0,0,0.06);
  }
  .week-nav .wn-label { font-size: 13px; font-weight: 700; }
  .nav-btn {
    background: #F0F4FF; border: none; border-radius: 8px;
    padding: 7px 13px; font-size: 12px; font-weight: 700;
    color: #0F3460; cursor: pointer;
  }

  /* ── 주간 요약 ── */
  .week-sum { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
  .ws-card { background: white; border-radius: 12px; padding: 12px 8px; text-align: center; box-shadow: 0 1px 5px rgba(0,0,0,0.06); }
  .ws-lbl { font-size: 10px; color: #888; margin-bottom: 3px; }
  .ws-val { font-size: 18px; font-weight: 800; }
  .ws-unit{ font-size: 10px; color: #AAA; }

  /* ── 일별 바 차트 ── */
  .day-bars { display: flex; align-items: flex-end; gap: 5px; height: 100px; }
  .day-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
  .day-bar-val { font-size: 8px; font-weight: 700; color: #555; }
  .day-bar-rect { width: 100%; border-radius: 4px 4px 0 0; min-height: 3px; transition: height 0.4s; }
  .day-bar-lbl { font-size: 11px; }

  /* ── 일별 상세 ── */
  .day-row {
    display: flex; align-items: center; gap: 7px;
    padding: 9px 0; border-bottom: 1px solid var(--c-line); cursor: pointer;
  }
  .day-row:last-child { border-bottom: none; }
  .dr-date { font-size: 11px; color: #888; width: 30px; flex-shrink: 0; }
  .dr-day  { font-size: 12px; font-weight: 700; width: 18px; flex-shrink: 0; }
  .dr-bar  { flex: 1; background: #F0F0F0; border-radius: 4px; height: 7px; overflow: hidden; }
  .dr-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
  .dr-kcal { font-size: 12px; font-weight: 700; width: 68px; text-align: right; flex-shrink: 0; }
  .dr-pct  { font-size: 10px; width: 30px; text-align: right; flex-shrink: 0; }

  /* ── 주간 총평 ── */
  .week-comment {
    background: linear-gradient(135deg, #F0FFF4, #EBF4FF);
    border-radius: 12px; padding: 14px; font-size: 12px; line-height: 1.8; color: #1A3A2E;
    margin-top: 12px;
  }
  .empty-state { text-align: center; padding: 40px 20px; color: #AAA; }
  .empty-icon  { font-size: 36px; margin-bottom: 10px; }

  /* ── 토스트 ── */
  .toast {
    position: fixed; bottom: calc(24px + var(--safe-bottom));
    left: 50%; transform: translateX(-50%) translateY(60px);
    border-radius: 22px; padding: 11px 22px;
    font-size: 13px; font-weight: 600; color: white;
    z-index: 200; white-space: nowrap; opacity: 0;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── 스택 바 ── */
  .stack-bar {
    display: flex; border-radius: 7px; height: 14px; overflow: hidden; margin-bottom: 6px;
  }
  .stack-legend { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #666; }
  .legend-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>
<div id="app">
  <!-- 헤더 -->
  <div class="app-header">
    <h1>🗓️ 주간 칼로리 트래커</h1>
    <div class="sub">매일 기록 · 일요일 주간 리포트</div>
    <div class="goal-badge">🎯 목표 1,900 kcal / 일</div>
  </div>

  <!-- 탭바 -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-input-btn" onclick="switchTab('input')">📝 오늘 입력</button>
    <button class="tab-btn" id="tab-weekly-btn" onclick="switchTab('weekly')">📊 주간 리포트</button>
  </div>

  <!-- 입력 탭 -->
  <div class="tab-content" id="tab-input">
    <div class="inner">
      <!-- 날짜 -->
      <div class="card">
        <label style="font-size:12px;color:#777;font-weight:600;display:block;margin-bottom:6px;">📅 날짜</label>
        <input type="date" id="input-date" onchange="onDateChange()">
      </div>

      <!-- 식사 그리드 -->
      <div class="meal-grid" id="meal-grid"></div>

      <!-- 합계 박스 -->
      <div class="total-box">
        <div class="t-lbl">🔥 <span id="total-date-lbl">오늘</span> 합계</div>
        <div class="t-val" id="total-kcal">0 kcal</div>
        <div class="t-gap" id="total-gap">목표까지 1,900 kcal 남음</div>
        <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <div class="prog-pct" id="prog-pct">0%</div>
      </div>

      <!-- 영양소 분석 (기록 있을 때만) -->
      <div id="nutrition-section" style="display:none">
        <div class="card">
          <div class="card-title">💪 탄단지 분석</div>
          <div class="macro-cards" id="macro-cards"></div>
          <div class="stack-bar" id="stack-bar"></div>
          <div class="stack-legend">
            <div class="legend-item"><div class="legend-dot" style="background:#378ADD"></div>탄수화물</div>
            <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div>단백질</div>
            <div class="legend-item"><div class="legend-dot" style="background:#EF9F27"></div>지방</div>
          </div>
        </div>

        <div class="card" id="meal-table-card">
          <div class="card-title">끼니별 상세</div>
          <table class="data-table" id="meal-table"></table>
        </div>

        <div id="food-tables"></div>
      </div>

      <button class="save-btn" onclick="handleSave()">💾 저장하기</button>
    </div>
  </div>

  <!-- 주간 탭 -->
  <div class="tab-content" id="tab-weekly" style="display:none">
    <div class="inner">
      <div class="week-nav">
        <button class="nav-btn" onclick="changeWeek(-1)">◀</button>
        <div class="wn-label" id="week-label"></div>
        <button class="nav-btn" onclick="changeWeek(1)">▶</button>
      </div>
      <div class="week-sum" id="week-sum"></div>
      <div class="card">
        <div class="card-title">📊 일별 칼로리 <span style="font-size:10px;color:#AAA;font-weight:400">— 목표 1,900</span></div>
        <div class="day-bars" id="day-bars"></div>
      </div>
      <div class="card">
        <div class="card-title">📋 일별 상세 <span style="font-size:10px;color:#AAA;font-weight:400">(탭하면 상세 보기)</span></div>
        <div id="day-rows"></div>
      </div>
      <div id="week-comment"></div>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
const GOAL = 1900;
const SK   = "calorie-tracker-v1";
const DAYS = ["일","월","화","수","목","금","토"];
const MEAL_COLORS = { breakfast:"#EF9F27", lunch:"#378ADD", dinner:"#7F77DD", snack:"#1D9E75" };
const MEAL_LABELS = { breakfast:"🌅 아침", lunch:"☀️ 점심", dinner:"🌙 저녁", snack:"🍪 간식" };

// ── 영양 DB ──
const NDB = {
  "2026-03-23-breakfast": mkMeal([
    ["🥚","계란","2개",160,1.0,14.0,10.0],
    ["🍌","바나나","1개(중)",100,26.0,1.2,0.3],
    ["🥛","베지밀 칼슘두유","190ml",125,12.0,6.0,5.0],
  ]),
  "2026-03-24-breakfast": mkMeal([
    ["🥚","계란","2개",160,1.0,14.0,10.0],
    ["🍌","바나나","1개(중)",100,26.0,1.2,0.3],
    ["🥛","베지밀 칼슘두유","190ml",125,12.0,6.0,5.0],
  ]),
  "2026-03-24-lunch": mkMeal([
    ["🥩","돈갈비찜","1인분",280,18.0,22.0,12.0],
    ["🍚","현미잡곡밥","1공기",300,63.0,6.0,1.5],
    ["🍵","홍합미역국","1그릇",55,4.0,5.0,1.5],
    ["🥚","부들달걀찜","1인분",100,2.0,8.0,6.0],
    ["🧅","양파장아찌","3~4조각",35,8.0,0.5,0.0],
  ]),
  "2026-03-24-dinner": mkMeal([
    ["🍳","볶음밥+숙주·부추볶음","1접시",480,68.0,12.0,16.0],
    ["🍢","고기 꼬치구이","1꼬치",150,5.0,14.0,8.0],
    ["🍵","맑은 국(오이·파)","1그릇",20,3.0,1.0,0.0],
    ["🥕","당근·무 피클","1소접시",25,6.0,0.5,0.0],
  ]),
  "2026-03-25-breakfast": mkMeal([
    ["🥚","계란","2개",160,1.0,14.0,10.0],
    ["🍌","바나나","1개(중)",100,26.0,1.2,0.3],
    ["🥛","베지밀 칼슘두유","190ml",125,12.0,6.0,5.0],
  ]),
  "2026-03-25-snack": mkMeal([
    ["☕","디카페인 아메리카노","1잔",5,0.5,0.3,0.0],
  ]),
};

function mkMeal(rows) {
  const items = rows.map(r=>({icon:r[0],name:r[1],amount:r[2],kcal:r[3],carb:r[4],prot:r[5],fat:r[6]}));
  return {
    carb: round1(items.reduce((s,i)=>s+i.carb,0)),
    prot: round1(items.reduce((s,i)=>s+i.prot,0)),
    fat:  round1(items.reduce((s,i)=>s+i.fat, 0)),
    items,
  };
}
function round1(v) { return Math.round(v*10)/10; }

// ── 날짜 유틸 ──
function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function getToday()    { return toDateStr(new Date()); }
function getWeekStart(s) {
  const d = new Date(s+"T00:00:00"); d.setDate(d.getDate()-d.getDay()); return toDateStr(d);
}
function addDays(s,n) {
  const d = new Date(s+"T00:00:00"); d.setDate(d.getDate()+n); return toDateStr(d);
}
function fmtMMDD(s) {
  const d = new Date(s+"T00:00:00"); return `${d.getMonth()+1}/${d.getDate()}`;
}

// ── localStorage ──
function loadData()       { try { return JSON.parse(localStorage.getItem(SK)||"{}"); } catch { return {}; } }
function saveData(d)      { localStorage.setItem(SK, JSON.stringify(d)); }

// ── 색상 ──
function barColor(k) {
  if (!k) return "#E0E0E0";
  if (k>GOAL) return "#F44336";
  if (k>GOAL*.88) return "#FF9800";
  return "#4CAF50";
}

// ── 상태 ──
let data={}, inputDate=getToday(), weekStart=getWeekStart(getToday()), expandedMeal=null;

// ── 초기화 ──
function init() {
  data = loadData();
  // seed
  if (!data["2026-03-23"]) data["2026-03-23"]={breakfast:385,lunch:0,dinner:0,snack:0};
  if (!data["2026-03-24"]) data["2026-03-24"]={breakfast:385,lunch:770,dinner:675,snack:0};
  if (!data["2026-03-25"]) data["2026-03-25"]={breakfast:385,lunch:0,dinner:0,snack:5};
  saveData(data);

  document.getElementById("input-date").value = inputDate;
  renderInput();
}

// ── 탭 전환 ──
function switchTab(t) {
  document.getElementById("tab-input").style.display  = t==="input"  ? "flex" : "none";
  document.getElementById("tab-weekly").style.display = t==="weekly" ? "flex" : "none";
  document.getElementById("tab-input").style.flexDirection = "column";
  document.getElementById("tab-input-btn").classList.toggle("active",  t==="input");
  document.getElementById("tab-weekly-btn").classList.toggle("active", t==="weekly");
  if (t==="weekly") renderWeekly();
}

// ── 날짜 변경 ──
function onDateChange() {
  inputDate = document.getElementById("input-date").value || getToday();
  expandedMeal = null;
  renderInput();
}

// ── 입력 탭 렌더 ──
function renderInput() {
  const entry = data[inputDate]||{};
  const meals = ["breakfast","lunch","dinner","snack"];
  const total = meals.reduce((s,m)=>s+(entry[m]||0),0);

  // 날짜 레이블
  document.getElementById("total-date-lbl").textContent = fmtMMDD(inputDate);

  // 식사 그리드
  const grid = document.getElementById("meal-grid");
  grid.innerHTML = meals.map(m=>{
    const kcal = entry[m]||0;
    const db   = NDB[`${inputDate}-${m}`];
    const isEx = expandedMeal===m;
    const c    = MEAL_COLORS[m];
    return `
      <div class="meal-card" style="border-left:3px solid ${c}">
        <div class="meal-card-top">
          <div class="meal-card-label">
            <span class="meal-name" style="color:${c}">${MEAL_LABELS[m]}</span>
            ${db ? `<button class="detail-btn" style="color:${c};border-color:${c}"
              onclick="toggleDetail('${m}')">${isEx?"접기":"상세"}</button>` : ""}
          </div>
          <input class="meal-input" type="number" min="0" max="9999" placeholder="0"
            id="meal-${m}" value="${kcal||""}"
            oninput="updateTotal()" inputmode="numeric">
          <div class="meal-unit">kcal</div>
        </div>
        ${isEx && db ? renderMealDetail(db, c) : ""}
      </div>`;
  }).join("");

  // 합계
  const pct = Math.min(Math.round(total/GOAL*100),100);
  const rem = GOAL-total;
  document.getElementById("total-kcal").textContent = total.toLocaleString()+" kcal";
  document.getElementById("total-gap").textContent  =
    total===0 ? "목표까지 1,900 kcal 남음" :
    rem>0 ? `목표까지 ${rem.toLocaleString()} kcal 남음` :
    `목표보다 ${Math.abs(rem).toLocaleString()} kcal 초과`;
  const fill = document.getElementById("prog-fill");
  fill.style.width      = pct+"%";
  fill.style.background = pct>=100?"#F44336":pct>=88?"#FF9800":"#4CAF50";
  document.getElementById("prog-pct").textContent = pct+"%";

  // 영양 섹션
  renderNutrition(inputDate, entry, total);
}

function renderMealDetail(db, c) {
  const totalMacro = db.carb*4 + db.prot*4 + db.fat*9;
  const cp = Math.round(db.carb*4/totalMacro*100);
  const pp = Math.round(db.prot*4/totalMacro*100);
  const fp = 100-cp-pp;
  return `<div class="meal-detail">
    <div class="macro-mini-bar">
      <div style="flex:${cp};background:#378ADD"></div>
      <div style="flex:${pp};background:#1D9E75"></div>
      <div style="flex:${fp};background:#EF9F27"></div>
    </div>
    <div class="macro-nums">
      <span><b style="color:#378ADD">탄</b> ${db.carb}g</span>
      <span><b style="color:#1D9E75">단</b> ${db.prot}g</span>
      <span><b style="color:#EF9F27">지</b> ${db.fat}g</span>
    </div>
    ${db.items.map(it=>`
      <div class="detail-item">
        <span class="detail-item-name">${it.icon} ${it.name} <span style="color:#BBB;font-size:10px">(${it.amount})</span></span>
        <span class="detail-item-kcal">${it.kcal}kcal</span>
      </div>`).join("")}
  </div>`;
}

function renderNutrition(dateStr, entry, total) {
  const sec = document.getElementById("nutrition-section");
  if (!total) { sec.style.display="none"; return; }

  // 끼니별 집계
  const meals = ["breakfast","lunch","dinner","snack"];
  let tc=0, tp=0, tf=0;
  const details = [];
  meals.forEach(m=>{
    const kcal = entry[m]||0;
    if (!kcal) return;
    const db = NDB[`${dateStr}-${m}`];
    if (db) {
      tc+=db.carb; tp+=db.prot; tf+=db.fat;
      details.push({m, kcal, carb:db.carb, prot:db.prot, fat:db.fat, items:db.items});
    } else {
      const c=round1(kcal*.55/4), p=round1(kcal*.20/4), f=round1(kcal*.25/9);
      tc+=c; tp+=p; tf+=f;
      details.push({m, kcal, carb:c, prot:p, fat:f, items:null});
    }
  });
  tc=round1(tc); tp=round1(tp); tf=round1(tf);

  const totalMacro = tc*4+tp*4+tf*9;
  const cp=Math.round(tc*4/totalMacro*100);
  const pp=Math.round(tp*4/totalMacro*100);
  const fp=100-cp-pp;

  // 3대 영양소 카드
  document.getElementById("macro-cards").innerHTML = [
    {lbl:"탄수화물",val:tc,color:"#378ADD",bg:"#EBF4FF",pct:cp},
    {lbl:"단백질",  val:tp,color:"#1D9E75",bg:"#EAFAF3",pct:pp},
    {lbl:"지방",    val:tf,color:"#EF9F27",bg:"#FFF8EB",pct:fp},
  ].map(n=>`
    <div class="macro-card" style="background:${n.bg}">
      <div class="mc-lbl">${n.lbl}</div>
      <div class="mc-val" style="color:${n.color}">${n.val}</div>
      <div class="mc-unit">g</div>
      <div class="mc-pct" style="color:${n.color}">열량의 ${n.pct}%</div>
    </div>`).join("");

  // 스택 바
  document.getElementById("stack-bar").innerHTML = `
    <div style="flex:${cp};background:#378ADD"></div>
    <div style="flex:${pp};background:#1D9E75"></div>
    <div style="flex:${fp};background:#EF9F27"></div>`;

  // 끼니별 테이블
  document.getElementById("meal-table").innerHTML = `
    <thead><tr>
      <th>끼니</th>
      <th style="color:#D85A30">kcal</th>
      <th style="color:#378ADD">탄(g)</th>
      <th style="color:#1D9E75">단(g)</th>
      <th style="color:#EF9F27">지(g)</th>
    </tr></thead>
    <tbody>
      ${details.map(d=>`<tr>
        <td style="color:${MEAL_COLORS[d.m]};font-weight:700">${MEAL_LABELS[d.m]}</td>
        <td style="color:#D85A30;font-weight:700">${d.kcal}</td>
        <td style="color:#378ADD;font-weight:600">${d.carb}</td>
        <td style="color:#1D9E75;font-weight:600">${d.prot}</td>
        <td style="color:#EF9F27;font-weight:600">${d.fat}</td>
      </tr>`).join("")}
    </tbody>
    <tfoot><tr>
      <td style="color:#333">합계</td>
      <td style="color:#D85A30">${total}</td>
      <td style="color:#1A5096">${tc}</td>
      <td style="color:#0E6B4E">${tp}</td>
      <td style="color:#A06010">${tf}</td>
    </tr></tfoot>`;

  // 음식별 상세 테이블
  document.getElementById("food-tables").innerHTML = details.filter(d=>d.items).map(d=>`
    <div class="card">
      <div class="card-title" style="color:${MEAL_COLORS[d.m]}">${MEAL_LABELS[d.m]} — 음식별</div>
      <table class="data-table">
        <thead><tr>
          <th>음식</th>
          <th style="color:#D85A30">kcal</th>
          <th style="color:#378ADD">탄</th>
          <th style="color:#1D9E75">단</th>
          <th style="color:#EF9F27">지</th>
        </tr></thead>
        <tbody>
          ${d.items.map(it=>`<tr>
            <td><div style="font-weight:600;font-size:12px">${it.icon} ${it.name}</div>
                <div style="font-size:10px;color:#BBB">${it.amount}</div></td>
            <td style="color:#D85A30;font-weight:700">${it.kcal}</td>
            <td style="color:#378ADD;font-weight:600">${it.carb}</td>
            <td style="color:#1D9E75;font-weight:600">${it.prot}</td>
            <td style="color:#EF9F27;font-weight:600">${it.fat}</td>
          </tr>`).join("")}
        </tbody>
        <tfoot><tr>
          <td style="color:#333">소계</td>
          <td style="color:#D85A30">${d.kcal}</td>
          <td style="color:#1A5096">${d.carb}</td>
          <td style="color:#0E6B4E">${d.prot}</td>
          <td style="color:#A06010">${d.fat}</td>
        </tr></tfoot>
      </table>
    </div>`).join("");

  sec.style.display = "block";
}

function toggleDetail(m) {
  expandedMeal = expandedMeal===m ? null : m;
  renderInput();
}

function updateTotal() {
  const meals = ["breakfast","lunch","dinner","snack"];
  const total = meals.reduce((s,m)=>s+(Number(document.getElementById("meal-"+m)?.value)||0),0);
  const pct = Math.min(Math.round(total/GOAL*100),100);
  const rem = GOAL-total;
  document.getElementById("total-kcal").textContent = total.toLocaleString()+" kcal";
  document.getElementById("total-gap").textContent  =
    total===0?"목표까지 1,900 kcal 남음":
    rem>0?`목표까지 ${rem.toLocaleString()} kcal 남음`:
    `목표보다 ${Math.abs(rem).toLocaleString()} kcal 초과`;
  const fill = document.getElementById("prog-fill");
  fill.style.width=pct+"%";
  fill.style.background=pct>=100?"#F44336":pct>=88?"#FF9800":"#4CAF50";
  document.getElementById("prog-pct").textContent=pct+"%";
}

function handleSave() {
  const meals = ["breakfast","lunch","dinner","snack"];
  const newEntry = {};
  let total = 0;
  meals.forEach(m=>{ newEntry[m]=Number(document.getElementById("meal-"+m)?.value)||0; total+=newEntry[m]; });
  if (!total) { showToast("⚠️ 칼로리를 입력해주세요","#E74C3C"); return; }
  const ex = data[inputDate];
  const same = ex && meals.every(m=>ex[m]===newEntry[m]);
  if (same) { showToast("📋 이미 저장된 데이터예요","#5A6A85"); return; }
  data[inputDate] = newEntry;
  saveData(data);
  showToast("✅ 저장 완료!","#1D9E75");
  renderInput();
}

// ── 주간 ──
function changeWeek(dir) {
  weekStart = addDays(weekStart, dir*7);
  renderWeekly();
}

function renderWeekly() {
  const we = addDays(weekStart,6);
  document.getElementById("week-label").textContent = `${fmtMMDD(weekStart)}(일) ~ ${fmtMMDD(we)}(토)`;

  const days = Array.from({length:7},(_,i)=>{
    const d = addDays(weekStart,i);
    const entry = data[d]||null;
    const kcal = entry ? Object.values(entry).reduce((s,v)=>s+(Number(v)||0),0) : 0;
    return {date:d, lbl:DAYS[new Date(d+"T00:00:00").getDay()], kcal};
  });
  const rec   = days.filter(d=>d.kcal>0);
  const wtot  = rec.reduce((s,d)=>s+d.kcal,0);
  const wavg  = rec.length?Math.round(wtot/rec.length):0;
  const gdays = rec.filter(d=>d.kcal<=GOAL).length;
  const cmax  = Math.max(...days.map(d=>d.kcal),GOAL)*1.18;

  // 요약 카드
  document.getElementById("week-sum").innerHTML = [
    {lbl:"주간 총합",val:wtot>0?wtot.toLocaleString():"—",unit:"kcal",color:"#D85A30"},
    {lbl:"일 평균",  val:wavg>0?wavg.toLocaleString():"—",unit:"kcal/일",color:barColor(wavg)},
    {lbl:"목표 달성",val:`${gdays}`,unit:`/${rec.length}일`,color:"#1D9E75"},
  ].map(c=>`<div class="ws-card">
    <div class="ws-lbl">${c.lbl}</div>
    <div class="ws-val" style="color:${c.color}">${c.val}</div>
    <div class="ws-unit">${c.unit}</div>
  </div>`).join("");

  // 바 차트
  document.getElementById("day-bars").innerHTML = days.map(d=>{
    const h = d.kcal?Math.round((d.kcal/cmax)*100):3;
    const isSun=d.lbl==="일", isSat=d.lbl==="토";
    return `<div class="day-bar-col">
      ${d.kcal?`<div class="day-bar-val">${(d.kcal/1000).toFixed(1)}k</div>`:""}
      <div class="day-bar-rect" style="height:${h}%;background:${barColor(d.kcal)}"></div>
      <div class="day-bar-lbl" style="color:${isSun?"#E74C3C":isSat?"#378ADD":"#888"};font-weight:${isSun||isSat?700:400}">${d.lbl}</div>
    </div>`;
  }).join("");

  // 일별 상세
  document.getElementById("day-rows").innerHTML = days.map(d=>{
    const p = d.kcal?Math.min(Math.round(d.kcal/GOAL*100),100):0;
    const isSun=d.lbl==="일", isSat=d.lbl==="토";
    return `<div class="day-row" onclick="gotoDate('${d.date}')">
      <div class="dr-date">${fmtMMDD(d.date)}</div>
      <div class="dr-day" style="color:${isSun?"#E74C3C":isSat?"#378ADD":"#555"}">${d.lbl}</div>
      <div class="dr-bar"><div class="dr-bar-fill" style="width:${p}%;background:${barColor(d.kcal)}"></div></div>
      <div class="dr-kcal" style="color:${d.kcal?"#D85A30":"#CCC"}">${d.kcal?d.kcal.toLocaleString()+" kcal":"미기록"}</div>
      <div class="dr-pct" style="color:${barColor(d.kcal)}">${d.kcal?Math.round(d.kcal/GOAL*100)+"%":"—"}</div>
    </div>`;
  }).join("");

  // 총평
  const c = document.getElementById("week-comment");
  if (!rec.length) {
    c.innerHTML=`<div class="empty-state"><div class="empty-icon">📭</div><div style="font-size:13px;line-height:1.7">이번 주 기록이 없어요.<br>입력 탭에서 식사를 기록해보세요!</div></div>`;
  } else {
    c.innerHTML=`<div class="week-comment">
      ${wavg<=GOAL?`🎉 이번 주 평균 ${wavg.toLocaleString()} kcal로 목표 이내! 훌륭해요 💪`
        :`⚠️ 이번 주 평균 ${wavg.toLocaleString()} kcal — 목표보다 ${(wavg-GOAL).toLocaleString()} kcal 초과했어요.`}<br>
      📅 ${rec.length}일 기록 · 목표 달성 ${gdays}일 · 미기록 ${7-rec.length}일<br>
      ${7-rec.length>0?`📝 미기록 ${7-rec.length}일 — 꾸준히 기록할수록 정확해져요!`:"✅ 7일 모두 기록 완료! 🌟"}
    </div>`;
  }
}

function gotoDate(d) {
  inputDate = d;
  document.getElementById("input-date").value = d;
  expandedMeal = null;
  switchTab("input");
  renderInput();
}

// ── 토스트 ──
function showToast(msg, bg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.background = bg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2200);
}

init();
</script>
</body>
</html>
